<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>

            * {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                font-weight: bolder;
            }

            /*phone display*/
            @media screen and (max-width:400px) {
                nav {
                    background-color: red;
                }

            #menublock>a {
                color: white;
            }
        }
        /* tablet display */
        @media screen and (min-width:401px) and
        (max-width:500px) {
            nav {
                background-color: blue;
            }
            
        }
        
            /* nav section */
            nav {
                height: 100px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                background-color: rgb(255, 0, 60);
            }

#menublock,
#logoblock {
    height: 100px;
    width: 400px;
    display: flex;
    justify-content: space-evenly;
    align-items: center;
}

#menublock > a {
    text-decoration: none;
    color: black;
}

#logoblock img {
    height: 140px;
}
#photoblock {
  /* viewpoint height */
    height: 85vh;
    background-color: rgb(211, 211, 211);
    display: flex;
    justify-content: space-evenly;
    align-items: center;  
}
    
#left,
#centre,
#right{
    display: flex;
    justify-content: space-evenly;
    align-items: center;
    height: 500px;
    width: 500px;
    background-color: white;
    border-radius: 30px;
    box-shadow: 0px 0px 12px rgba(0, 0 , 0, 0.5);
}

#photoblock img {
    height: 500px;
}
        </style>
    </head>
    <body>
        
  <nav>
  <div id="logoblock">
  <img 
src=" https://thumbs.dreamstime.com/z/lets-shopping-logo-design-template-shop-icon-135610500.jpg"  alt=""/>
  </div>
  <div id="menublock" style="width: 600px">
    <a href="">HOME</a>
    <a href="">OFFERS</a>
    <a href="">CONTACT</a>
    <a href="">REVIEWS</a>
  </div>
  </nav>
  <br />
        </div>
    </body>
    </html>
